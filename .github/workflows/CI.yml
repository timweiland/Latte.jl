name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: julia-actions/setup-julia@v1
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v1
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v3
        with:
          files: lcov.info
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      actions: write # needed to allow julia-actions/cache to proactively delete old caches that it has created
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.11'
      - uses: julia-actions/cache@v1
      - name: Configure doc environment
        shell: julia --project=docs --color=yes {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CI runs build-from-clean — but the local mtime cache in
          # docs/generate_literate.jl could rehydrate from a Julia
          # cache action with stale .md files. Force a full tutorial
          # rebuild so deployed docs always reflect current source.
          LATTE_REBUILD_TUTORIALS: '1'
      - name: Run doctests
        shell: julia --project=docs --color=yes {0}
        run: |
          using Documenter: DocMeta, doctest
          using Latte
          DocMeta.setdocmeta!(Latte, :DocTestSetup, :(using Latte); recursive=true)
          doctest(Latte)
  validate:
    name: Correctness gate (validate_ci)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.10'
          arch: x64
      - uses: julia-actions/cache@v1
      - name: Resolve benchmark env (Latte from checkout, GMRFs from registry)
        # The committed benchmark/Manifest.toml pins local dev-paths; drop it so
        # CI resolves Latte from the checkout and its deps from the registry.
        shell: julia --color=yes {0}
        run: |
          using Pkg
          rm(joinpath("benchmark", "Manifest.toml"); force = true)
          Pkg.activate("benchmark")
          Pkg.develop(PackageSpec(path = pwd()))
          Pkg.instantiate()
      - name: Run the analytic-conjugate correctness gate
        run: julia --project=benchmark benchmark/validate_ci.jl
