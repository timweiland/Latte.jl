name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.group }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
        os:
          - ubuntu-latest
        arch:
          - x64
        # Runtime-balanced shards; the group → test-file mapping lives in test/runtests.jl.
        group:
          - core
          - dsl1
          - dsl2
          - dsl3
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: julia-actions/setup-julia@v1
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          LATTE_TEST_GROUP: ${{ matrix.group }}
          # >1 thread so the parallel-suite concurrency tests exercise instead of skipping.
          JULIA_NUM_THREADS: '4'
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      actions: write # needed to allow julia-actions/cache to proactively delete old caches that it has created
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Configure doc environment
        shell: julia --project=docs --color=yes {0}
        run: |
          using Pkg
          Pkg.develop(PackageSpec(path=pwd()))
          Pkg.instantiate()
      - uses: julia-actions/julia-buildpkg@v1
      # The executed tutorial outputs (.md + plots, all gitignored) are cached
      # so the deploy reuses them instead of re-running all 17 tutorials
      # (~32 min) on every push. The ISO-week in the key refreshes the cache
      # weekly (catching output drift from dependency patches); a change to a
      # tutorial source or Project.toml also busts it. The tracked index.md is
      # excluded from the cache, so it always stays at the checked-out version.
      - name: Current ISO week (weekly cache refresh)
        id: week
        run: echo "week=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"
      - name: Cache executed tutorials
        id: tutcache
        uses: actions/cache@v4
        with:
          path: |
            docs/src/tutorials
            !docs/src/tutorials/index.md
          key: tutorials-${{ steps.week.outputs.week }}-${{ hashFiles('docs/src/literate-tutorials/**', 'Project.toml', 'docs/Project.toml') }}
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cache hit ⇒ reuse the executed tutorials (no per-push execution).
          # Cache miss ⇒ regenerate them; the cache then saves the fresh
          # outputs for the rest of the week.
          LATTE_SKIP_TUTORIALS: ${{ steps.tutcache.outputs.cache-hit == 'true' && '1' || '0' }}
          LATTE_REBUILD_TUTORIALS: ${{ steps.tutcache.outputs.cache-hit == 'true' && '0' || '1' }}
      - name: Run doctests
        shell: julia --project=docs --color=yes {0}
        run: |
          using Documenter: DocMeta, doctest
          using Latte
          DocMeta.setdocmeta!(Latte, :DocTestSetup, :(using Latte); recursive=true)
          doctest(Latte)
  validate:
    name: Correctness gate (validate_ci)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.12'
          arch: x64
      - uses: julia-actions/cache@v2
      - name: Resolve benchmark env (Latte from checkout, GMRFs from registry)
        # The committed benchmark/Manifest.toml pins local dev-paths; drop it so
        # CI resolves Latte from the checkout and its deps from the registry.
        shell: julia --color=yes {0}
        run: |
          using Pkg
          rm(joinpath("benchmark", "Manifest.toml"); force = true)
          Pkg.activate("benchmark")
          Pkg.develop(PackageSpec(path = pwd()))
          Pkg.instantiate()
      - name: Run the analytic-conjugate correctness gate
        run: julia --project=benchmark benchmark/validate_ci.jl
